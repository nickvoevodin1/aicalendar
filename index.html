<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#7c3aed" />
  <title>AI Calendar MVP</title>
  <style>
    :root {
      --bg: #f5f6f8;
      --surface: #ffffff;
      --surface-2: #f0f2f5;
      --surface-3: #fbfcfe;
      --line: #e2e6ee;
      --line-soft: #edf0f5;
      --text: #1f2937;
      --muted: #6b7280;
      --muted-2: #9aa3b2;
      --accent: #7c3aed;
      --accent-dark: #6d28d9;
      --accent-text: #fff;
      --blue: #3b82f6;
      --red: #ef4444;
      --shadow: 0 18px 45px rgba(15, 23, 42, 0.12);
      --radius: 18px;
      --hour-height: 58px;
      --sidebar: 290px;
      --topbar: 66px;
      --mini-cell: 34px;
      --hover: #f5f0ff;
      --weekend-bg: #faf8ff;
      --today-bg: #f3edff;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }

    [data-theme="dark"] {
      --bg: #0d0020;
      --surface: #130028;
      --surface-2: #1e003d;
      --surface-3: #17002f;
      --line: #3d1060;
      --line-soft: #2a0845;
      --text: #ede0ff;
      --muted: #b08ad0;
      --muted-2: #7a5c9a;
      --accent: #a855f7;
      --accent-dark: #9333ea;
      --accent-text: #fff;
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.75);
      --hover: #2a0852;
      --weekend-bg: #0f001d;
      --today-bg: #1e0045;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
    }

    body {
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    button, input, textarea, select {
      font: inherit;
      color: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      background: none;
      color: inherit;
    }

    .app {
      height: 100vh;
      height: 100dvh;
      display: grid;
      grid-template-columns: var(--sidebar) 1fr;
      grid-template-rows: var(--topbar) 1fr;
    }

    .topbar {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 20px;
      background: color-mix(in srgb, var(--surface) 88%, transparent);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(16px);
      z-index: 20;
    }

    .menu-btn { display: none; }

    .mobile-views { display: none; }

    .brand {
      width: calc(var(--sidebar) - 20px);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #5b21b6, #8b5cf6);
      color: #fff;
      box-shadow: 0 8px 18px rgba(91, 33, 182, .4);
      font-weight: 900;
      flex-shrink: 0;
    }

    .brand-text span {
      display: block;
      line-height: 1.05;
    }

    .brand-text small {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-weight: 500;
      letter-spacing: normal;
      font-size: 12px;
    }

    .nav-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      color: var(--text);
    }

    .icon-btn:hover {
      background: var(--surface-2);
    }

    .today-btn, .primary-btn, .ghost-btn {
      height: 38px;
      padding: 0 15px;
      border-radius: 12px;
      font-weight: 650;
      white-space: nowrap;
    }

    .today-btn, .ghost-btn {
      background: var(--surface-2);
    }

    .today-btn:hover, .ghost-btn:hover {
      background: var(--hover);
    }

    .primary-btn {
      background: #111827;
      color: white;
      box-shadow: 0 10px 24px rgba(17, 24, 39, .18);
    }

    .primary-btn:hover {
      transform: translateY(-1px);
    }

    .range-title {
      min-width: 220px;
      font-size: 20px;
      font-weight: 760;
      letter-spacing: -0.03em;
    }

    .spacer {
      flex: 1;
    }

    .search {
      width: min(360px, 30vw);
      height: 38px;
      border: 1px solid transparent;
      outline: none;
      border-radius: 13px;
      background: var(--surface-2);
      padding: 0 14px 0 38px;
      color: var(--text);
      background-image:
        radial-gradient(circle at 15px 50%, transparent 7px, #7c8797 7.5px, #7c8797 8.5px, transparent 9px),
        linear-gradient(45deg, transparent 55%, #7c8797 55%, #7c8797 62%, transparent 62%);
      background-size: 28px 28px, 12px 12px;
      background-position: 4px 5px, 21px 22px;
      background-repeat: no-repeat;
    }

    .search:focus {
      border-color: var(--line);
      background-color: var(--surface);
    }

    .view-switch {
      display: flex;
      padding: 4px;
      border-radius: 14px;
      background: var(--surface-2);
      gap: 3px;
    }

    .view-switch button {
      height: 30px;
      min-width: 70px;
      padding: 0 11px;
      border-radius: 10px;
      color: var(--muted);
      font-weight: 700;
      font-size: 14px;
    }

    .view-switch button.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 4px 12px rgba(15, 23, 42, .08);
    }

    .sidebar {
      grid-row: 2;
      border-right: 1px solid var(--line);
      background: var(--surface);
      overflow: auto;
      padding: 18px;
    }

    .drawer-head { display: none; }

    .sidebar-search { display: none; }

    .create-btn {
      width: 100%;
      height: 46px;
      border-radius: 16px;
      background: var(--accent);
      color: var(--accent-text);
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      box-shadow: 0 12px 24px rgba(124, 58, 237, .32);
    }

    .create-btn:hover {
      background: var(--accent-dark);
    }

    .sidebar-section {
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px solid var(--line-soft);
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      color: var(--text);
      font-weight: 760;
      letter-spacing: -0.02em;
    }

    .mini-month {
      background: var(--surface-3);
      border: 1px solid var(--line-soft);
      border-radius: 18px;
      padding: 12px;
    }

    .mini-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      font-weight: 760;
      letter-spacing: -0.02em;
    }

    .mini-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
      text-align: center;
    }

    .mini-grid .dow {
      color: var(--muted-2);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      height: 24px;
      display: grid;
      place-items: center;
    }

    .mini-day {
      height: var(--mini-cell);
      border-radius: 11px;
      display: grid;
      place-items: center;
      color: var(--text);
      font-size: 13px;
      font-weight: 650;
      position: relative;
    }

    .mini-day.outside {
      color: var(--muted-2);
    }

    .mini-day:hover {
      background: var(--surface-2);
    }

    .mini-day.selected {
      background: #111827;
      color: white;
    }

    [data-theme="dark"] .mini-day.selected {
      background: var(--accent);
      color: var(--accent-text);
    }

    .mini-day.today:not(.selected) {
      background: #ede0ff;
      color: #4b1d8f;
    }

    [data-theme="dark"] .mini-day.today:not(.selected) {
      background: #3d1060;
      color: #e0c0ff;
    }

    [data-theme="dark"] .mini-day.today:not(.selected) {
      background: #3a3411;
      color: var(--accent);
    }

    .mini-day.has-events::after {
      content: "";
      position: absolute;
      bottom: 5px;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: currentColor;
      opacity: .8;
    }

    .calendar-list {
      display: grid;
      gap: 10px;
    }

    .calendar-item {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 38px;
      border-radius: 12px;
      padding: 6px 8px;
      color: var(--text);
      font-weight: 620;
      cursor: pointer;
    }

    .calendar-item:hover {
      background: var(--hover);
    }

    .calendar-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex: 0 0 auto;
    }

    .calendar-item input {
      width: 18px;
      height: 18px;
      accent-color: var(--accent-dark);
    }

    .upcoming {
      display: grid;
      gap: 10px;
    }

    .upcoming-card {
      border: 1px solid var(--line-soft);
      background: var(--surface-3);
      border-radius: 15px;
      padding: 10px 12px;
      width: 100%;
    }

    .upcoming-time {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 3px;
      font-weight: 650;
    }

    .upcoming-title {
      font-weight: 760;
      font-size: 14px;
      line-height: 1.2;
    }

    .ai-card {
      padding: 14px;
      border-radius: 18px;
      background: radial-gradient(circle at 15% 10%, rgba(168, 85, 247, .55), transparent 40%),
                  linear-gradient(135deg, #1e003d, #3d1060);
      color: #fff;
      overflow: hidden;
      position: relative;
    }

    .ai-card h3 {
      margin: 0 0 6px;
      font-size: 15px;
      letter-spacing: -0.02em;
    }

    .ai-card p {
      margin: 0 0 12px;
      color: rgba(255,255,255,.72);
      font-size: 13px;
      line-height: 1.4;
    }

    .ai-card button {
      height: 34px;
      padding: 0 12px;
      border-radius: 11px;
      background: white;
      color: #111827;
      font-weight: 800;
      font-size: 13px;
    }

    .main {
      grid-row: 2;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .calendar-shell {
      flex: 1;
      overflow: hidden;
      background: var(--surface);
      position: relative;
    }

    .week-view, .day-view {
      height: 100%;
      overflow: auto;
      position: relative;
    }

    .cal-header {
      position: sticky;
      top: 0;
      z-index: 9;
      background: var(--surface);
      border-bottom: 2px solid var(--line);
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
    }

    @keyframes slideFromRight {
      from { opacity: 0; transform: translateX(5%); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideFromLeft {
      from { opacity: 0; transform: translateX(-5%); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .slide-from-right { animation: slideFromRight .22s cubic-bezier(.2,.6,.4,1); }
    .slide-from-left  { animation: slideFromLeft  .22s cubic-bezier(.2,.6,.4,1); }

    .time-select-overlay {
      position: absolute;
      left: 0;
      right: 0;
      background: rgba(168, 85, 247, .22);
      border: 2px solid rgba(168, 85, 247, .7);
      border-radius: 8px;
      pointer-events: none;
      z-index: 3;
    }

    .hrow { display: grid; }

    .week-header .hrow {
      grid-template-columns: 62px repeat(7, minmax(110px, 1fr));
    }

    .day-header .hrow {
      grid-template-columns: 62px 1fr;
    }

    .corner {
      min-height: 72px;
      border-right: 1px solid var(--line);
      display: grid;
      place-items: end center;
      padding-bottom: 10px;
      color: var(--muted-2);
      font-size: 12px;
      font-weight: 650;
    }

    .day-title {
      min-height: 72px;
      border-right: 1px solid var(--line-soft);
      padding: 12px 8px 8px;
      text-align: center;
      display: grid;
      align-content: center;
      gap: 5px;
      cursor: pointer;
    }

    .day-title:last-child {
      border-right: 0;
    }

    .day-title .dow {
      color: var(--muted);
      font-size: 12px;
      font-weight: 760;
      text-transform: uppercase;
    }

    .day-title .date {
      width: 34px;
      height: 34px;
      display: inline-grid;
      place-items: center;
      justify-self: center;
      border-radius: 50%;
      font-size: 18px;
      font-weight: 800;
    }

    .day-title.today .date {
      background: var(--accent);
      color: var(--accent-text);
    }

    /* all-day band */
    .allday-row {
      border-top: 1px solid var(--line-soft);
      min-height: 30px;
    }

    .allday-label {
      border-right: 1px solid var(--line);
      display: grid;
      place-items: center;
      color: var(--muted-2);
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .03em;
      text-align: center;
      padding: 4px;
    }

    .allday-cell {
      border-right: 1px solid var(--line-soft);
      padding: 4px 5px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
    }

    .allday-cell:last-child { border-right: 0; }

    .allday-chip {
      border-radius: 8px;
      padding: 3px 7px;
      color: #fff;
      font-size: 11px;
      font-weight: 750;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: left;
      width: 100%;
    }

    .grid {
      display: grid;
      position: relative;
    }

    .week-grid {
      grid-template-columns: 62px repeat(7, minmax(110px, 1fr));
    }

    .day-grid {
      grid-template-columns: 62px minmax(240px, 1fr);
    }

    .time-col {
      border-right: 1px solid var(--line);
      background: var(--surface);
      z-index: 2;
    }

    .time-label {
      height: var(--hour-height);
      position: relative;
      color: var(--muted-2);
      font-size: 12px;
      font-weight: 650;
      text-align: right;
      padding-right: 9px;
      transform: translateY(-8px);
    }

    .day-col {
      position: relative;
      min-height: calc(var(--hour-height) * 18);
      border-right: 1px solid var(--line-soft);
      background-image: linear-gradient(to bottom, var(--line-soft) 1px, transparent 1px);
      background-size: 100% var(--hour-height);
      overflow: hidden;
    }

    .day-col:last-child {
      border-right: 0;
    }

    .day-col.weekend {
      background-color: var(--weekend-bg);
    }

    .day-col.today-bg {
      background-color: var(--today-bg);
    }

    .hour-cell {
      height: var(--hour-height);
      position: relative;
    }

    .hour-cell:hover {
      background: rgba(124, 58, 237, .07);
    }

    .now-line {
      position: absolute;
      left: 62px;
      right: 0;
      height: 2px;
      background: var(--red);
      z-index: 8;
      pointer-events: none;
    }

    .now-line::before {
      content: "";
      position: absolute;
      left: -5px;
      top: -4px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--red);
    }

    .event {
      position: absolute;
      left: 7px;
      right: 7px;
      border-radius: 13px;
      padding: 8px 10px;
      color: white;
      box-shadow: 0 8px 18px rgba(15, 23, 42, .14);
      overflow: hidden;
      cursor: grab;
      z-index: 4;
      min-height: 34px;
      user-select: none;
    }

    .event:active {
      cursor: grabbing;
    }

    .event.compact {
      padding: 5px 8px;
      border-radius: 11px;
    }

    .event-title {
      font-weight: 830;
      font-size: 13px;
      line-height: 1.18;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .event-time {
      margin-top: 3px;
      font-size: 11px;
      opacity: .86;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .event-desc {
      margin-top: 4px;
      font-size: 11px;
      opacity: .8;
      line-height: 1.25;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .month-view {
      height: 100%;
      overflow: auto;
      background: var(--surface);
    }

    .month-grid {
      min-height: 100%;
      display: grid;
      grid-template-columns: repeat(7, minmax(120px, 1fr));
      grid-auto-rows: minmax(130px, 1fr);
      border-left: 1px solid var(--line-soft);
      border-top: 1px solid var(--line-soft);
    }

    .month-dow {
      position: sticky;
      top: 0;
      z-index: 5;
      height: 36px;
      background: color-mix(in srgb, var(--surface) 94%, transparent);
      border-right: 1px solid var(--line-soft);
      border-bottom: 1px solid var(--line);
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      backdrop-filter: blur(12px);
    }

    .month-cell {
      border-right: 1px solid var(--line-soft);
      border-bottom: 1px solid var(--line-soft);
      padding: 9px;
      position: relative;
      min-height: 128px;
    }

    .month-cell:hover {
      background: var(--today-bg);
    }

    .month-cell.outside {
      background: var(--surface-3);
      color: var(--muted-2);
    }

    .month-cell.today {
      background: var(--today-bg);
    }

    .month-date {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 6px;
    }

    .month-cell.today .month-date {
      background: var(--accent);
      color: var(--accent-text);
    }

    .month-event {
      display: block;
      width: 100%;
      border-radius: 9px;
      padding: 5px 7px;
      color: #fff;
      margin-bottom: 5px;
      font-size: 12px;
      font-weight: 750;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: left;
    }

    /* mobile compact month dots */
    .month-dot-row {
      display: none;
      gap: 3px;
      justify-content: center;
      margin-top: 2px;
    }
    .month-dot {
      width: 5px; height: 5px; border-radius: 50%;
    }

    /* AGENDA / list view */
    .agenda-view {
      height: 100%;
      overflow: auto;
      background: var(--surface);
      padding: 8px 0 100px;
    }

    .agenda-wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 10px 18px;
    }

    .agenda-group {
      display: grid;
      grid-template-columns: 88px 1fr;
      gap: 14px;
      padding: 14px 0;
      border-bottom: 1px solid var(--line-soft);
    }

    .agenda-date {
      text-align: right;
      position: sticky;
      top: 8px;
      align-self: start;
    }

    .agenda-date .num {
      font-size: 28px;
      font-weight: 820;
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .agenda-date.is-today .num {
      color: var(--accent-dark);
    }

    .agenda-date .dow {
      margin-top: 4px;
      font-size: 12px;
      font-weight: 760;
      text-transform: uppercase;
      color: var(--muted);
    }

    .agenda-date .month {
      font-size: 12px;
      color: var(--muted-2);
      font-weight: 650;
    }

    .agenda-items { display: grid; gap: 8px; min-width: 0; }

    .agenda-item {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      width: 100%;
      text-align: left;
      border-radius: 14px;
      padding: 11px 13px;
      background: var(--surface-3);
      border: 1px solid var(--line-soft);
    }

    .agenda-item:hover { background: var(--hover); }

    .agenda-bar {
      width: 4px;
      align-self: stretch;
      border-radius: 4px;
      flex: 0 0 auto;
      min-height: 34px;
    }

    .agenda-meta { min-width: 0; flex: 1; }

    .agenda-time {
      font-size: 12px;
      font-weight: 720;
      color: var(--muted);
      margin-bottom: 2px;
    }

    .agenda-title {
      font-weight: 780;
      font-size: 15px;
      line-height: 1.25;
      letter-spacing: -0.01em;
    }

    .agenda-note {
      margin-top: 3px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .agenda-cal {
      margin-top: 4px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted-2);
    }

    .empty-state {
      display: grid;
      place-items: center;
      height: 100%;
      color: var(--muted);
      padding: 30px;
      text-align: center;
    }

    /* FAB */
    .fab {
      display: none;
      position: fixed;
      right: 18px;
      bottom: calc(18px + env(safe-area-inset-bottom));
      width: 60px;
      height: 60px;
      border-radius: 20px;
      background: var(--accent);
      color: var(--accent-text);
      font-size: 30px;
      font-weight: 600;
      align-items: center;
      justify-content: center;
      box-shadow: 0 14px 30px rgba(124, 58, 237, .5);
      z-index: 45;
    }

    .fab:active { transform: scale(.94); }

    /* drawer overlay */
    .scrim {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, .45);
      backdrop-filter: blur(2px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s ease;
      z-index: 30;
    }

    .scrim.open {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, .38);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 50;
      padding: 20px;
    }

    .modal-backdrop.open {
      display: flex;
    }

    .modal {
      width: min(560px, 96vw);
      background: var(--surface);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
      max-height: 92vh;
      display: flex;
      flex-direction: column;
    }

    .modal-head {
      padding: 18px 20px;
      border-bottom: 1px solid var(--line-soft);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .modal-head h2 {
      margin: 0;
      font-size: 18px;
      letter-spacing: -0.03em;
    }

    .modal-body {
      padding: 18px 20px 20px;
      display: grid;
      gap: 14px;
      overflow: auto;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .field input,
    .field textarea,
    .field select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 13px;
      min-height: 46px;
      outline: none;
      padding: 10px 12px;
      background: var(--surface-3);
      color: var(--text);
    }

    .field textarea {
      resize: vertical;
      min-height: 86px;
    }

    .field input:focus,
    .field textarea:focus,
    .field select:focus {
      border-color: var(--accent-dark);
      background: var(--surface);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .allday-toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 13px;
      background: var(--surface-3);
      border: 1px solid var(--line);
      font-weight: 680;
      cursor: pointer;
    }

    .allday-toggle input { width: 20px; height: 20px; accent-color: var(--accent-dark); }

    .modal-actions {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding-top: 6px;
    }

    .right-actions {
      display: flex;
      gap: 10px;
      margin-left: auto;
    }

    .danger-btn {
      height: 44px;
      padding: 0 14px;
      border-radius: 12px;
      color: #b91c1c;
      font-weight: 800;
      background: #fee2e2;
      display: none;
    }

    [data-theme="dark"] .danger-btn { background: #3a1414; color: #fca5a5; }

    .danger-btn.visible {
      display: inline-flex;
      align-items: center;
    }

    .cancel-btn, .save-btn {
      height: 44px;
      padding: 0 16px;
      border-radius: 12px;
      font-weight: 800;
    }

    .cancel-btn {
      background: var(--surface-2);
    }

    .save-btn {
      background: var(--accent);
      color: var(--accent-text);
    }

    [data-theme="dark"] .save-btn { background: var(--accent); color: var(--accent-text); }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(22px + env(safe-area-inset-bottom));
      transform: translateX(-50%) translateY(16px);
      background: #111827;
      color: #fff;
      padding: 12px 16px;
      border-radius: 14px;
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      z-index: 80;
      transition: .2s ease;
      font-weight: 700;
      max-width: 90vw;
      text-align: center;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (hover: none) {
      .hour-cell:hover { background: none; }
    }

    /* ---------- TABLET ---------- */
    @media (max-width: 980px) {
      :root { --sidebar: 250px; }
      .search { display: none; }
      .range-title { min-width: 150px; font-size: 17px; }
      .view-switch button { min-width: 56px; }
      .brand-text small { display: none; }
    }

    /* ---------- MOBILE ---------- */
    @media (max-width: 760px) {
      body { overflow: hidden; }

      .app {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto 1fr;
      }

      .topbar {
        grid-column: 1;
        grid-row: 1;
        padding: 0 10px;
        gap: 6px;
        min-height: 56px;
      }

      .menu-btn { display: grid; }

      .brand { display: none; }

      .range-title {
        min-width: 0;
        flex: 1;
        font-size: 16px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        order: 5;
      }

      .topbar .menu-btn { order: 1; }
      .topbar .nav-group { order: 2; }
      .topbar #themeBtn { order: 9; }
      .topbar .spacer { display: none; }

      .nav-group .today-btn { display: none; }

      .desktop-views { display: none; }

      /* view switch as its own full-width bar */
      .mobile-views {
        display: flex;
        grid-row: 2;
        grid-column: 1;
        gap: 4px;
        padding: 6px 10px;
        background: var(--surface);
        border-bottom: 1px solid var(--line);
      }
      .mobile-views button {
        flex: 1;
        height: 36px;
        border-radius: 11px;
        color: var(--muted);
        font-weight: 700;
        font-size: 14px;
        background: var(--surface-2);
      }
      .mobile-views button.active {
        background: var(--accent);
        color: var(--accent-text);
      }

      /* sidebar becomes drawer */
      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        width: min(330px, 86vw);
        z-index: 35;
        transform: translateX(-104%);
        transition: transform .28s cubic-bezier(.4,.0,.2,1);
        box-shadow: var(--shadow);
        border-right: 1px solid var(--line);
        padding: 16px 16px calc(24px + env(safe-area-inset-bottom));
      }

      .sidebar.open { transform: translateX(0); }

      .drawer-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 14px;
      }

      .drawer-head .brand { display: flex; }

      .sidebar-search {
        display: block;
        width: 100%;
        height: 44px;
        margin-bottom: 14px;
        border: 1px solid var(--line);
        outline: none;
        border-radius: 13px;
        background: var(--surface-3);
        padding: 0 14px;
        color: var(--text);
      }

      .main { grid-row: 3; }

      .fab { display: flex; }

      /* day view fills width, week scrolls with snap */
      .week-header .hrow { grid-template-columns: 46px repeat(7, 19vw); }
      .week-grid { grid-template-columns: 46px repeat(7, 19vw); }
      .day-header .hrow { grid-template-columns: 46px 1fr; }
      .day-grid { grid-template-columns: 46px 1fr; }

      .corner, .time-col, .allday-label { width: 46px; }
      .now-line { left: 46px; }

      .day-title { min-height: 64px; padding: 8px 4px 6px; }
      .day-title .date { width: 30px; height: 30px; font-size: 16px; }
      .corner { min-height: 64px; font-size: 10px; }

      .time-label { font-size: 11px; padding-right: 6px; }

      /* compact month: fit width, dots instead of chips */
      .month-grid {
        grid-template-columns: repeat(7, 1fr);
        grid-auto-rows: minmax(64px, 1fr);
      }
      .month-cell { min-height: 64px; padding: 5px 4px; }
      .month-event, .month-cell .more-label { display: none; }
      .month-dot-row { display: flex; }
      .month-date {
        width: 26px; height: 26px; margin: 0 auto 2px;
        font-size: 13px;
      }
      .month-cell { text-align: center; }

      .agenda-group { grid-template-columns: 64px 1fr; gap: 12px; }
      .agenda-wrap { padding: 8px 14px; }
      .agenda-date .num { font-size: 24px; }

      /* modal -> bottom sheet */
      .modal-backdrop { align-items: flex-end; padding: 0; }
      .modal {
        width: 100%;
        max-height: 94vh;
        border-radius: 24px 24px 0 0;
        animation: sheetUp .3s cubic-bezier(.4,0,.2,1);
        padding-bottom: env(safe-area-inset-bottom);
      }
      .modal-body { padding-bottom: 24px; }
      .modal-actions { position: sticky; bottom: 0; background: var(--surface); padding: 12px 0 4px; }
    }

    @keyframes sheetUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    @media (max-width: 380px) {
      .week-header .hrow { grid-template-columns: 44px repeat(7, 22vw); }
      .week-grid { grid-template-columns: 44px repeat(7, 22vw); }
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: .01ms !important; transition-duration: .01ms !important; }
    }

    :focus-visible {
      outline: 2px solid var(--accent-dark);
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">

      <div class="nav-group">

    <aside class="sidebar" id="sidebar">

  <div class="scrim" id="scrim"></div>

  <div class="modal-backdrop" id="modalBackdrop">
    <form class="modal" id="eventForm">

  <div class="toast" id="toast"></div>

  <script>
    const START_HOUR = 6;
    const END_HOUR = 24;
    const HOURS = END_HOUR - START_HOUR;
    const HOUR_HEIGHT = 58;
    const DOW = ["Пн", "Вт", "Ср", "Чт", "Пт", "Сб", "Вс"];
    const MONTHS = ["январь", "февраль", "март", "апрель", "май", "июнь", "июль", "август", "сентябрь", "октябрь", "ноябрь", "декабрь"];
    const MONTHS_TITLE = ["января", "февраля", "марта", "апреля", "мая", "июня", "июля", "августа", "сентября", "октября", "ноября", "декабря"];
    const MONTHS_SHORT = ["янв", "фев", "мар", "апр", "май", "июн", "июл", "авг", "сен", "окт", "ноя", "дек"];

    // Works even when the page is opened as a local file (non-secure context),
    // where crypto.randomUUID is unavailable.
    function uid() {
      try {
        if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
      } catch (e) {}
      try {
        if (window.crypto && crypto.getRandomValues) {
          const b = crypto.getRandomValues(new Uint8Array(16));
          b[6] = (b[6] & 0x0f) | 0x40;
          b[8] = (b[8] & 0x3f) | 0x80;
          const h = [...b].map(x => x.toString(16).padStart(2, "0"));
          return `${h.slice(0,4).join("")}-${h.slice(4,6).join("")}-${h.slice(6,8).join("")}-${h.slice(8,10).join("")}-${h.slice(10,16).join("")}`;
        }
      } catch (e) {}
      return "id-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 10);
    }

    const calendars = [

    const demoEvents = [

      {

      },

    let state = {

    const els = {

      miniNext: document.getElementById("miniNext"),
      calendarList: document.getElementById("calendarList"),

      deleteEvent: document.getElementById("deleteEvent"),
      duplicateEvent: document.getElementById("duplicateEvent"),

      eventCalendar: document.getElementById("eventCalendar"),

      eventDescription: document.getElementById("eventDescription"),
      eventAllDay: document.getElementById("eventAllDay"),
      timeFields: document.getElementById("timeFields"),

      toast: document.getElementById("toast"),

    };

    function init() {
      applyTheme(loadTheme());
      syncViewButtons();
      renderCalendarList();
      renderEventCalendarOptions();
      bindEvents();
      renderAll();
    }

    /* ---------------- THEME ---------------- */
    const ICON_MOON = '<path d="M16 11.5A6 6 0 0 1 8.5 4a6 6 0 1 0 7.5 7.5Z" fill="currentColor"/>';
    const ICON_SUN = '<circle cx="10" cy="10" r="4" fill="currentColor"/><g stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.2 4.2l1.4 1.4M14.4 14.4l1.4 1.4M15.8 4.2l-1.4 1.4M5.6 14.4l-1.4 1.4"/></g>';

    function loadTheme() {
      try {
        const saved = localStorage.getItem("focusCalendar.theme");
        if (saved) return saved;
      } catch {}
      return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
    }

    function applyTheme(theme) {
      document.documentElement.setAttribute("data-theme", theme);
      els.themeIcon.innerHTML = theme === "dark" ? ICON_SUN : ICON_MOON;
      const meta = document.querySelector('meta[name="theme-color"]');
      if (meta) meta.setAttribute("content", theme === "dark" ? "#0d0020" : "#7c3aed");
    }

    function toggleTheme() {
      const next = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
      applyTheme(next);
      try { localStorage.setItem("focusCalendar.theme", next); } catch {}
    }

    /* ---------------- DRAWER ---------------- */
    function openDrawer() {
      els.sidebar.classList.add("open");
      els.scrim.classList.add("open");
    }
    function closeDrawer() {
      els.sidebar.classList.remove("open");
      els.scrim.classList.remove("open");
    }
    function isMobile() { return window.matchMedia("(max-width: 760px)").matches; }

    function bindEvents() {
      els.todayBtn.addEventListener("click", goToday);
      els.fab.addEventListener("click", () => {
        const date = isoDate(state.selectedDate);
        openModal({ date, start: nextRoundedTime(), end: addMinutesToTime(nextRoundedTime(), 60) });
      });

      els.prevBtn.addEventListener("click", () => navigate(-1));
      els.nextBtn.addEventListener("click", () => navigate(1));

      els.menuBtn.addEventListener("click", openDrawer);
      els.drawerClose.addEventListener("click", closeDrawer);
      els.scrim.addEventListener("click", closeDrawer);
      els.themeBtn.addEventListener("click", toggleTheme);

      [els.viewSwitch, els.viewSwitchMobile].forEach(sw => {
        sw.addEventListener("click", (e) => {
          const btn = e.target.closest("button[data-view]");
          if (!btn) return;
          state.view = btn.dataset.view;
          saveView();
          syncViewButtons();
          renderAll();
        });
      });

      els.createBtn.addEventListener("click", () => {
        if (isMobile()) closeDrawer();
        const date = isoDate(state.selectedDate);
        openModal({ date, start: nextRoundedTime(), end: addMinutesToTime(nextRoundedTime(), 60) });
      });

      els.miniPrev.addEventListener("click", () => {
        state.miniDate = new Date(state.miniDate.getFullYear(), state.miniDate.getMonth() - 1, 1);
        renderMiniMonth();
      });
      els.miniNext.addEventListener("click", () => {
        state.miniDate = new Date(state.miniDate.getFullYear(), state.miniDate.getMonth() + 1, 1);
        renderMiniMonth();
      });

      const onSearch = (val) => {
        state.search = val.trim().toLowerCase();
        els.searchInput.value = val;
        els.searchInputMobile.value = val;
        renderCalendar();
        renderUpcoming();
      };
      els.searchInput.addEventListener("input", () => onSearch(els.searchInput.value));
      els.searchInputMobile.addEventListener("input", () => onSearch(els.searchInputMobile.value));

      els.closeModal.addEventListener("click", closeModal);
      els.cancelModal.addEventListener("click", closeModal);
      els.modalBackdrop.addEventListener("click", (e) => {
        if (e.target === els.modalBackdrop) closeModal();
      });

      els.eventAllDay.addEventListener("change", () => {
        els.timeFields.style.display = els.eventAllDay.checked ? "none" : "grid";
      });

      els.deleteEvent.addEventListener("click", () => {
        if (!state.editingId) return;
        state.events = state.events.filter(ev => ev.id !== state.editingId);
        saveEvents();
        closeModal();
        renderAll();
        showToast("Событие удалено");
      });

      els.duplicateEvent.addEventListener("click", () => {
        if (!state.editingId) return;
        const original = state.events.find(ev => ev.id === state.editingId);
        if (!original) return;
        const copy = { ...original, id: uid(), title: original.title + " (копия)" };
        state.events.push(copy);
        saveEvents();
        closeModal();
        renderAll();
        showToast("Событие дублировано");
      });

      els.eventForm.addEventListener("submit", (e) => {
        e.preventDefault();
        saveEventFromForm();
      });

      els.demoPlanBtn.addEventListener("click", () => {
        showToast("На 2 этапе сюда добавим автопланирование задач по свободным слотам");
      });

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") { closeModal(); closeDrawer(); }
      });

      bindSwipe();
    }

    /* swipe to navigate prev/next on the calendar area */
    function bindSwipe() {
      let x0 = null, y0 = null, t0 = 0;
      els.calendarShell.addEventListener("touchstart", (e) => {
        if (e.target.closest(".event, .month-event, .agenda-item")) { x0 = null; return; }
        const t = e.changedTouches[0];
        x0 = t.clientX; y0 = t.clientY; t0 = Date.now();
      }, { passive: true });

      els.calendarShell.addEventListener("touchend", (e) => {
        if (x0 === null) return;
        const t = e.changedTouches[0];
        const dx = t.clientX - x0, dy = t.clientY - y0, dt = Date.now() - t0;
        x0 = null;
        if (dt > 700) return;
        if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.8) {
          const velocity = Math.abs(dx) / Math.max(1, dt); // px/ms
          const steps = velocity > 1.2 ? 2 : 1; // fast flick = skip 2 periods
          navigate((dx < 0 ? 1 : -1) * steps);
        }
      }, { passive: true });
    }

    function goToday() {
      state.selectedDate = new Date();
      state.miniDate = new Date();
      renderAll();
    }

    function syncViewButtons() {
      [...els.viewSwitch.children, ...els.viewSwitchMobile.children].forEach(b => {
        b.classList.toggle("active", b.dataset.view === state.view);
      });
    }

    function navigate(step) {
      if (state.view === "day") state.selectedDate = addDays(state.selectedDate, step);
      else if (state.view === "week") state.selectedDate = addDays(state.selectedDate, step * 7);
      else if (state.view === "agenda") state.selectedDate = addDays(state.selectedDate, step * 7);
      else state.selectedDate = new Date(state.selectedDate.getFullYear(), state.selectedDate.getMonth() + step, 1);
      state.miniDate = new Date(state.selectedDate);
      state._navDir = step > 0 ? "right" : "left";
      renderAll();
    }

    function renderAll() {
      renderTitle();
      renderMiniMonth();
      renderCalendar();
      renderUpcoming();
      if (state._navDir) {
        const cls = state._navDir === "right" ? "slide-from-right" : "slide-from-left";
        els.calendarShell.classList.remove("slide-from-right", "slide-from-left");
        void els.calendarShell.offsetWidth; // reflow
        els.calendarShell.classList.add(cls);
        state._navDir = null;
      }
    }

    function renderTitle() {
      if (state.view === "day") {
        els.rangeTitle.textContent = `${state.selectedDate.getDate()} ${MONTHS_TITLE[state.selectedDate.getMonth()]} ${state.selectedDate.getFullYear()}`;
      } else if (state.view === "week") {
        const start = startOfWeek(state.selectedDate);
        const end = addDays(start, 6);
        const sameMonth = start.getMonth() === end.getMonth();
        const left = sameMonth ? start.getDate() : `${start.getDate()} ${MONTHS_TITLE[start.getMonth()]}`;
        els.rangeTitle.textContent = `${left} — ${end.getDate()} ${MONTHS_TITLE[end.getMonth()]} ${end.getFullYear()}`;
      } else if (state.view === "agenda") {
        els.rangeTitle.textContent = "Предстоящие события";
      } else {
        els.rangeTitle.textContent = `${capitalize(MONTHS[state.selectedDate.getMonth()])} ${state.selectedDate.getFullYear()}`;
      }
    }

    function renderCalendarList() {
      els.calendarList.innerHTML = calendars.map(cal => `
        <label class="calendar-item">
          <input type="checkbox" data-calendar="${cal.id}" checked />
          <span class="calendar-dot" style="background:${cal.color}"></span>
          <span>${cal.name}</span>
        </label>
      `).join("");

      els.calendarList.addEventListener("change", (e) => {
        const id = e.target.dataset.calendar;
        if (!id) return;
        if (e.target.checked) state.visibleCalendars.add(id);
        else state.visibleCalendars.delete(id);
        renderAll();
      });
    }

    function renderEventCalendarOptions() {
      els.eventCalendar.innerHTML = calendars.map(cal => `<option value="${cal.id}">${cal.name}</option>`).join("");
    }

    function renderMiniMonth() {
      const year = state.miniDate.getFullYear();
      const month = state.miniDate.getMonth();
      els.miniTitle.textContent = `${capitalize(MONTHS[month])} ${year}`;

      const first = new Date(year, month, 1);
      const gridStart = startOfWeek(first);
      const days = Array.from({ length: 42 }, (_, i) => addDays(gridStart, i));
      const eventDates = new Set(state.events.map(e => e.date));

      els.miniGrid.innerHTML = [
        ...DOW.map(d => `<div class="dow">${d}</div>`),
        ...days.map(day => {
          const classes = [
            "mini-day",
            day.getMonth() !== month ? "outside" : "",
            sameDay(day, new Date()) ? "today" : "",
            sameDay(day, state.selectedDate) ? "selected" : "",
            eventDates.has(isoDate(day)) ? "has-events" : ""
          ].filter(Boolean).join(" ");
          return `<button class="${classes}" data-date="${isoDate(day)}">${day.getDate()}</button>`;
        })
      ].join("");

      els.miniGrid.querySelectorAll(".mini-day").forEach(btn => {
        btn.addEventListener("click", () => {
          state.selectedDate = parseDate(btn.dataset.date);
          state.miniDate = new Date(state.selectedDate);
          if (state.view === "month" || state.view === "agenda") state.view = "day";
          saveView();
          syncViewButtons();
          if (isMobile()) closeDrawer();
          renderAll();
        });
      });
    }

    function renderCalendar() {
      if (state.view === "month") renderMonthView();
      else if (state.view === "agenda") renderAgenda();
      else renderTimeGrid(state.view);
    }

    function renderTimeGrid(view) {
      const isWeek = view === "week";
      const days = isWeek
        ? Array.from({ length: 7 }, (_, i) => addDays(startOfWeek(state.selectedDate), i))
        : [state.selectedDate];

      const headerClass = isWeek ? "week-header" : "day-header";
      const gridClass = isWeek ? "week-grid" : "day-grid";

      const dowRow = `
        <div class="hrow dow-row">
          <div class="corner">GMT+${timezoneOffsetHours()}</div>
          ${days.map(day => `
            <div class="day-title ${sameDay(day, new Date()) ? "today" : ""}" data-date="${isoDate(day)}">
              <div class="dow">${DOW[(day.getDay() + 6) % 7]}</div>
              <div class="date">${day.getDate()}</div>
            </div>
          `).join("")}
        </div>
      `;

      const alldayRow = `
        <div class="hrow allday-row">
          <div class="allday-label">весь<br>день</div>
          ${days.map(day => {
            const dayAllDay = getVisibleEvents().filter(ev => ev.date === isoDate(day) && ev.allDay);
            return `<div class="allday-cell">${dayAllDay.map(ev => {
              const cal = getCalendar(ev.calendarId);
              return `<button class="allday-chip" data-event-id="${ev.id}" style="background:${cal.color}">${escapeHtml(ev.title)}</button>`;
            }).join("")}</div>`;
          }).join("")}
        </div>
      `;

      const header = `<div class="cal-header ${headerClass}">${dowRow}${alldayRow}</div>`;

      const timeLabels = `
        <div class="time-col">
          ${Array.from({ length: HOURS }, (_, i) => `<div class="time-label">${pad(START_HOUR + i)}:00</div>`).join("")}
        </div>
      `;

      const columns = days.map(day => {
        const dayEvents = getVisibleEvents().filter(ev => ev.date === isoDate(day) && !ev.allDay);
        const dayClass = [
          "day-col",
          [0,6].includes(day.getDay()) ? "weekend" : "",
          sameDay(day, new Date()) ? "today-bg" : ""
        ].filter(Boolean).join(" ");

        return `
          <div class="${dayClass}" data-date="${isoDate(day)}">
            ${Array.from({ length: HOURS }, (_, i) => `
              <div class="hour-cell" data-date="${isoDate(day)}" data-hour="${START_HOUR + i}"></div>
            `).join("")}
            ${layoutDayEvents(dayEvents)}
          </div>
        `;
      }).join("");

      const viewClass = isWeek ? "week-view" : "day-view";
      els.calendarShell.innerHTML = `
        <div class="${viewClass}" id="scrollArea">
          ${header}
          <div class="grid ${gridClass}">
            ${timeLabels}
            ${columns}
          </div>
        </div>
      `;

      const scrollArea = document.getElementById("scrollArea");
      scrollArea.scrollTop = Math.max(0, (Math.min(new Date().getHours(), 14) - START_HOUR - 1) * HOUR_HEIGHT);

      addNowLine(days);
      bindGridInteractions();
      bindEventInteractions();
      bindDayTitles();
    }

    /* lay out overlapping events side by side */
    function layoutDayEvents(events) {
      const sorted = [...events].sort((a, b) => timeToMinutes(a.start) - timeToMinutes(b.start) || timeToMinutes(b.end) - timeToMinutes(a.end));
      const cols = [];
      sorted.forEach(ev => {
        let placed = false;
        for (const col of cols) {
          const last = col[col.length - 1];
          if (timeToMinutes(ev.start) >= timeToMinutes(last.end)) { col.push(ev); ev._col = cols.indexOf(col); placed = true; break; }
        }
        if (!placed) { ev._col = cols.length; cols.push([ev]); }
      });
      const total = Math.max(1, cols.length);
      return sorted.map(ev => eventMarkup(ev, ev._col || 0, total)).join("");
    }

    function eventMarkup(ev, col = 0, total = 1) {
      const cal = getCalendar(ev.calendarId);
      const top = (timeToMinutes(ev.start) - START_HOUR * 60) / 60 * HOUR_HEIGHT;
      const height = Math.max(30, (timeToMinutes(ev.end) - timeToMinutes(ev.start)) / 60 * HOUR_HEIGHT - 4);
      const compact = height < 56 ? "compact" : "";
      const gap = 4;
      const widthPct = 100 / total;
      const leftStyle = total > 1
        ? `left:calc(${col * widthPct}% + 6px);width:calc(${widthPct}% - ${gap + 6}px);right:auto;`
        : "";
      return `
        <div class="event ${compact}" draggable="true" data-event-id="${ev.id}"
             style="top:${top}px;height:${height}px;background:${cal.color};${leftStyle}">
          <div class="event-title">${escapeHtml(ev.title)}</div>
          <div class="event-time">${ev.start} — ${ev.end}</div>
          ${height > 70 && ev.description ? `<div class="event-desc">${escapeHtml(ev.description)}</div>` : ""}
        </div>
      `;
    }

    function addNowLine(days) {
      const todayIndex = days.findIndex(day => sameDay(day, new Date()));
      if (todayIndex === -1) return;
      const now = new Date();
      const minutes = now.getHours() * 60 + now.getMinutes();
      if (minutes < START_HOUR * 60 || minutes > END_HOUR * 60) return;
      const grid = els.calendarShell.querySelector(".grid");
      if (!grid) return;
      const line = document.createElement("div");
      line.className = "now-line";
      line.style.top = `${(minutes - START_HOUR * 60) / 60 * HOUR_HEIGHT}px`;
      grid.appendChild(line);
    }

    function bindDayTitles() {
      els.calendarShell.querySelectorAll(".day-title[data-date]").forEach(t => {
        t.addEventListener("click", () => {
          state.selectedDate = parseDate(t.dataset.date);
          state.miniDate = new Date(state.selectedDate);
          state.view = "day";
          saveView();
          syncViewButtons();
          renderAll();
        });
      });
    }

    function bindGridInteractions() {
      els.calendarShell.querySelectorAll(".hour-cell").forEach(cell => {
        cell.addEventListener("click", () => {
          const start = `${pad(Number(cell.dataset.hour))}:00`;
          openModal({ date: cell.dataset.date, start, end: addMinutesToTime(start, 60) });
        });
        cell.addEventListener("dragover", (e) => e.preventDefault());
        cell.addEventListener("drop", (e) => {
          e.preventDefault();
          const id = e.dataTransfer.getData("text/event-id");
          const ev = state.events.find(item => item.id === id);
          if (!ev) return;
          const duration = timeToMinutes(ev.end) - timeToMinutes(ev.start);
          const start = `${pad(Number(cell.dataset.hour))}:00`;
          ev.date = cell.dataset.date;
          ev.start = start;
          ev.end = addMinutesToTime(start, duration);
          ev.allDay = false;
          saveEvents();
          renderAll();
          showToast("Событие перенесено");
        });
      });

      /* time range drag selection on day columns */
      let dragState = null;

      function getHourMinFromY(col, clientY) {
        const rect = col.getBoundingClientRect();
        const y = clientY - rect.top;
        const totalMinutes = Math.max(0, Math.floor(y / HOUR_HEIGHT * 60));
        const h = START_HOUR + Math.floor(totalMinutes / 60);
        const m = totalMinutes % 60;
        return { h: Math.min(h, 23), m: Math.min(m, 59) };
      }

      function snapToSlot(h, m) {
        const snapped = Math.round(m / 30) * 30;
        if (snapped >= 60) return { h: Math.min(h + 1, 23), m: 0 };
        return { h, m: snapped };
      }

      els.calendarShell.querySelectorAll(".day-col").forEach(col => {
        col.addEventListener("touchstart", (e) => {
          if (e.target.closest(".event")) return;
          const touch = e.changedTouches[0];
          const { h, m } = getHourMinFromY(col, touch.clientY);
          const snapped = snapToSlot(h, m);
          dragState = {
            col,
            date: col.dataset.date,
            startH: snapped.h,
            startM: snapped.m,
            endH: snapped.h,
            endM: snapped.m,
            moved: false,
            overlay: null,
            startY: touch.clientY
          };
        }, { passive: true });

        col.addEventListener("touchmove", (e) => {
          if (!dragState || dragState.col !== col) return;
          const touch = e.changedTouches[0];
          const dy = Math.abs(touch.clientY - dragState.startY);
          if (dy < 12) return;
          dragState.moved = true;
          const { h, m } = getHourMinFromY(col, touch.clientY);
          const snapped = snapToSlot(h, m);
          dragState.endH = snapped.h;
          dragState.endM = snapped.m;

          const startMin = Math.min(dragState.startH * 60 + dragState.startM, dragState.endH * 60 + dragState.endM);
          const endMin   = Math.max(dragState.startH * 60 + dragState.startM, dragState.endH * 60 + dragState.endM);

          const topPx    = (startMin - START_HOUR * 60) / 60 * HOUR_HEIGHT;
          const heightPx = Math.max(HOUR_HEIGHT / 2, (endMin - startMin) / 60 * HOUR_HEIGHT);

          if (!dragState.overlay) {
            dragState.overlay = document.createElement("div");
            dragState.overlay.className = "time-select-overlay";
            col.appendChild(dragState.overlay);
          }
          dragState.overlay.style.top    = `${topPx}px`;
          dragState.overlay.style.height = `${heightPx}px`;
        }, { passive: true });

        col.addEventListener("touchend", () => {
          if (!dragState || dragState.col !== col) return;
          if (dragState.overlay) dragState.overlay.remove();
          if (dragState.moved) {
            const startMin = Math.min(dragState.startH * 60 + dragState.startM, dragState.endH * 60 + dragState.endM);
            const endMin   = Math.max(dragState.startH * 60 + dragState.startM, dragState.endH * 60 + dragState.endM);
            const start = `${pad(Math.floor(startMin / 60))}:${pad(startMin % 60)}`;
            const end   = `${pad(Math.floor(endMin   / 60))}:${pad(endMin   % 60)}`;
            openModal({ date: dragState.date, start, end });
          }
          dragState = null;
        }, { passive: true });
      });
    }

    function bindEventInteractions() {
      els.calendarShell.querySelectorAll("[data-event-id]").forEach(el => {
        el.addEventListener("click", (e) => {
          e.stopPropagation();
          const ev = state.events.find(item => item.id === el.dataset.eventId);
          if (ev) openModal(ev);
        });
        el.addEventListener("dragstart", (e) => {
          e.dataTransfer.setData("text/event-id", el.dataset.eventId);
        });
      });
    }

    /* ---------------- AGENDA VIEW ---------------- */
    function renderAgenda() {
      const startDate = new Date(state.selectedDate.getFullYear(), state.selectedDate.getMonth(), state.selectedDate.getDate());
      const startIso = isoDate(startDate);
      const horizon = isoDate(addDays(startDate, 60));

      const events = getVisibleEvents()
        .filter(ev => ev.date >= startIso && ev.date <= horizon)
        .sort((a, b) => (a.date).localeCompare(b.date)
          || Number(b.allDay) - Number(a.allDay)
          || a.start.localeCompare(b.start));

      if (!events.length) {
        els.calendarShell.innerHTML = `<div class="empty-state">
          <div>
            <div style="font-size:34px;margin-bottom:8px">📭</div>
            <div style="font-weight:760;font-size:16px;color:var(--text)">Пусто на ближайшие 2 месяца</div>
            <div style="margin-top:6px">Нажмите «+», чтобы добавить событие</div>
          </div>
        </div>`;
        return;
      }

      const groups = {};
      events.forEach(ev => { (groups[ev.date] = groups[ev.date] || []).push(ev); });

      const html = Object.keys(groups).sort().map(dateStr => {
        const day = parseDate(dateStr);
        const isToday = sameDay(day, new Date());
        const items = groups[dateStr].map(ev => {
          const cal = getCalendar(ev.calendarId);
          const time = ev.allDay ? "Весь день" : `${ev.start} — ${ev.end}`;
          return `
            <button class="agenda-item" data-event-id="${ev.id}">
              <span class="agenda-bar" style="background:${cal.color}"></span>
              <span class="agenda-meta">
                <span class="agenda-time">${time}</span>
                <span class="agenda-title">${escapeHtml(ev.title)}</span>
                ${ev.description ? `<span class="agenda-note">${escapeHtml(ev.description)}</span>` : ""}
                <span class="agenda-cal"><span class="calendar-dot" style="width:8px;height:8px;background:${cal.color}"></span>${cal.name}</span>
              </span>
            </button>`;
        }).join("");

        return `
          <div class="agenda-group">
            <div class="agenda-date ${isToday ? "is-today" : ""}">
              <div class="num">${day.getDate()}</div>
              <div class="dow">${isToday ? "Сегодня" : DOW[(day.getDay() + 6) % 7]}</div>
              <div class="month">${MONTHS_SHORT[day.getMonth()]}</div>
            </div>
            <div class="agenda-items">${items}</div>
          </div>`;
      }).join("");

      els.calendarShell.innerHTML = `<div class="agenda-view"><div class="agenda-wrap">${html}</div></div>`;

      els.calendarShell.querySelectorAll("[data-event-id]").forEach(el => {
        el.addEventListener("click", () => {
          const ev = state.events.find(item => item.id === el.dataset.eventId);
          if (ev) openModal(ev);
        });
      });
    }

    /* ---------------- MONTH VIEW ---------------- */
    function renderMonthView() {
      const year = state.selectedDate.getFullYear();
      const month = state.selectedDate.getMonth();
      const first = new Date(year, month, 1);
      const gridStart = startOfWeek(first);
      const days = Array.from({ length: 42 }, (_, i) => addDays(gridStart, i));

      els.calendarShell.innerHTML = `
        <div class="month-view">
          <div class="month-grid">
            ${DOW.map(d => `<div class="month-dow">${d}</div>`).join("")}
            ${days.map(day => {
              const dateStr = isoDate(day);
              const events = getVisibleEvents().filter(ev => ev.date === dateStr)
                .sort((a,b)=> Number(b.allDay)-Number(a.allDay) || a.start.localeCompare(b.start));
              const shown = events.slice(0, 4);
              const hidden = events.length - shown.length;
              const classes = [
                "month-cell",
                day.getMonth() !== month ? "outside" : "",
                sameDay(day, new Date()) ? "today" : ""
              ].filter(Boolean).join(" ");

              const dots = events.slice(0, 4).map(ev => {
                const cal = getCalendar(ev.calendarId);
                return `<span class="month-dot" style="background:${cal.color}"></span>`;
              }).join("");

              return `
                <div class="${classes}" data-date="${dateStr}">
                  <button class="month-date" data-create-date="${dateStr}">${day.getDate()}</button>
                  <div class="month-dot-row">${dots}</div>
                  ${shown.map(ev => {
                    const cal = getCalendar(ev.calendarId);
                    const label = ev.allDay ? escapeHtml(ev.title) : `${ev.start} ${escapeHtml(ev.title)}`;
                    return `<button class="month-event" data-event-id="${ev.id}" style="background:${cal.color}">${label}</button>`;
                  }).join("")}
                  ${hidden > 0 ? `<div class="more-label" style="color:var(--muted);font-size:12px;font-weight:700;">+ ещё ${hidden}</div>` : ""}
                </div>
              `;
            }).join("")}
          </div>
        </div>
      `;

      els.calendarShell.querySelectorAll("[data-create-date]").forEach(btn => {
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          // on mobile, tapping a day number opens that day
          if (isMobile()) {
            state.selectedDate = parseDate(btn.dataset.createDate);
            state.miniDate = new Date(state.selectedDate);
            state.view = "day";
            saveView();
            syncViewButtons();
            renderAll();
          } else {
            openModal({ date: btn.dataset.createDate, start: "10:00", end: "11:00" });
          }
        });
      });

      els.calendarShell.querySelectorAll(".month-event[data-event-id]").forEach(el => {
        el.addEventListener("click", (e) => {
          e.stopPropagation();
          const ev = state.events.find(item => item.id === el.dataset.eventId);
          if (ev) openModal(ev);
        });
      });

      els.calendarShell.querySelectorAll(".month-cell").forEach(cell => {
        cell.addEventListener("dblclick", () => {
          openModal({ date: cell.dataset.date, start: "10:00", end: "11:00" });
        });
      });
    }

    function renderUpcoming() {
      const nowDate = isoDate(new Date());
      const events = getVisibleEvents()
        .filter(ev => ev.date >= nowDate)
        .sort((a, b) => (a.date + (a.allDay ? "00:00" : a.start)).localeCompare(b.date + (b.allDay ? "00:00" : b.start)))
        .slice(0, 5);

      if (!events.length) {
        els.upcomingList.innerHTML = `<div class="upcoming-card"><div class="upcoming-title">Нет ближайших событий</div></div>`;
        return;
      }

      els.upcomingList.innerHTML = events.map(ev => {
        const day = parseDate(ev.date);
        const cal = getCalendar(ev.calendarId);
        const time = ev.allDay ? "весь день" : `${ev.start} — ${ev.end}`;
        return `
          <button class="upcoming-card" data-event-id="${ev.id}" style="text-align:left;border-left:4px solid ${cal.color}">
            <div class="upcoming-time">${humanDate(day)} · ${time}</div>
            <div class="upcoming-title">${escapeHtml(ev.title)}</div>
          </button>
        `;
      }).join("");

      els.upcomingList.querySelectorAll("[data-event-id]").forEach(btn => {
        btn.addEventListener("click", () => {
          const ev = state.events.find(item => item.id === btn.dataset.eventId);
          if (ev) {
            state.selectedDate = parseDate(ev.date);
            state.miniDate = parseDate(ev.date);
            if (isMobile()) closeDrawer();
            renderAll();
            openModal(ev);
          }
        });
      });
    }

    /* ---------------- MODAL ---------------- */
    function openModal(data = {}) {
      state.editingId = data.id || null;
      els.modalTitle.textContent = data.id ? "Редактировать событие" : "Новое событие";
      els.eventTitle.value = data.title || "";
      els.eventDate.value = data.date || isoDate(state.selectedDate);
      els.eventStart.value = data.start || "10:00";
      els.eventEnd.value = data.end || "11:00";
      els.eventCalendar.value = data.calendarId || "startup";
      els.eventReminder.value = data.reminder || "";
      els.eventDescription.value = data.description || "";
      els.eventAllDay.checked = Boolean(data.allDay);
      els.timeFields.style.display = els.eventAllDay.checked ? "none" : "grid";
      els.deleteEvent.classList.toggle("visible", Boolean(data.id));
      els.duplicateEvent.style.display = data.id ? "" : "none";
      els.modalBackdrop.classList.add("open");
      setTimeout(() => els.eventTitle.focus(), 30);
    }

    function closeModal() {
      els.modalBackdrop.classList.remove("open");
      state.editingId = null;
      els.eventForm.reset();
      els.timeFields.style.display = "grid";
    }

    function saveEventFromForm() {
      const allDay = els.eventAllDay.checked;
      let start = els.eventStart.value || "00:00";
      let end = els.eventEnd.value || "23:59";

      if (allDay) { start = "00:00"; end = "23:59"; }
      else if (timeToMinutes(end) <= timeToMinutes(start)) {
        showToast("Время окончания должно быть позже начала");
        return;
      }

      const payload = {
        title: els.eventTitle.value.trim(),
        date: els.eventDate.value,
        start, end,
        allDay,
        reminder: els.eventReminder.value,
        calendarId: els.eventCalendar.value,
        description: els.eventDescription.value.trim()
      };

      if (!payload.title) { showToast("Добавь название события"); return; }

      if (state.editingId) {
        state.events = state.events.map(ev => ev.id === state.editingId ? { ...ev, ...payload } : ev);
        showToast("Событие обновлено");
      } else {
        state.events.push({ id: uid(), ...payload });
        showToast("Событие создано");
      }

      saveEvents();
      state.selectedDate = parseDate(payload.date);
      state.miniDate = parseDate(payload.date);
      closeModal();
      renderAll();
    }

    function getVisibleEvents() {
      return state.events.filter(ev => {
        if (!state.visibleCalendars.has(ev.calendarId)) return false;
        if (!state.search) return true;
        return `${ev.title} ${ev.description}`.toLowerCase().includes(state.search);
      });
    }

    function getCalendar(id) {
      return calendars.find(c => c.id === id) || calendars[0];
    }

    /* ---------------- STORAGE ---------------- */
    function loadEvents() {
      try {
        const saved = localStorage.getItem("focusCalendar.events");
        if (!saved) return demoEvents;
        return JSON.parse(saved).map(ev => ({ allDay: false, reminder: "", ...ev }));
      } catch { return demoEvents; }
    }
    function saveEvents() {
      try { localStorage.setItem("focusCalendar.events", JSON.stringify(state.events)); } catch {}
    }
    function loadView() {
      try {
        const v = localStorage.getItem("focusCalendar.view");
        if (v) return v;
      } catch {}
      return window.matchMedia("(max-width: 760px)").matches ? "day" : "week";
    }
    function saveView() {
      try { localStorage.setItem("focusCalendar.view", state.view); } catch {}
    }

    /* ---------------- DATE HELPERS ---------------- */
    function startOfWeek(date) {
      const d = new Date(date.getFullYear(), date.getMonth(), date.getDate());
      const day = (d.getDay() + 6) % 7;
      d.setDate(d.getDate() - day);
      return d;
    }
    function addDays(date, days) {
      const d = new Date(date);
      d.setDate(d.getDate() + days);
      return d;
    }
    function sameDay(a, b) {
      return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
    }
    function isoDate(date) {
      const d = new Date(date.getFullYear(), date.getMonth(), date.getDate());
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
    }
    function parseDate(iso) {
      const [y, m, d] = iso.split("-").map(Number);
      return new Date(y, m - 1, d);
    }
    function pad(n) { return String(n).padStart(2, "0"); }
    function timeToMinutes(time) {
      const [h, m] = time.split(":").map(Number);
      return h * 60 + m;
    }
    function addMinutesToTime(time, minutes) {
      const total = timeToMinutes(time) + minutes;
      const normalized = Math.max(0, Math.min(23 * 60 + 59, total));
      return `${pad(Math.floor(normalized / 60))}:${pad(normalized % 60)}`;
    }
    function nextRoundedTime() {
      const now = new Date();
      let minutes = now.getHours() * 60 + now.getMinutes();
      minutes = Math.ceil(minutes / 30) * 30;
      if (minutes < START_HOUR * 60) minutes = START_HOUR * 60;
      if (minutes > 22 * 60) minutes = 10 * 60;
      return `${pad(Math.floor(minutes / 60))}:${pad(minutes % 60)}`;
    }
    function humanDate(date) {
      if (sameDay(date, new Date())) return "Сегодня";
      if (sameDay(date, addDays(new Date(), 1))) return "Завтра";
      return `${date.getDate()} ${MONTHS_TITLE[date.getMonth()]}`;
    }
    function capitalize(str) { return str.charAt(0).toUpperCase() + str.slice(1); }
    function timezoneOffsetHours() {
      const offset = -new Date().getTimezoneOffset() / 60;
      return offset >= 0 ? offset : String(offset);
    }
    function escapeHtml(str = "") {
      return String(str)
        .replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;").replaceAll("'", "&#039;");
    }
    function showToast(message) {
      els.toast.textContent = message;
      els.toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => els.toast.classList.remove("show"), 2200);
    }

    /* keep "now" line fresh */
    setInterval(() => {
      if (state.view === "week" || state.view === "day") {
        const days = state.view === "week"
          ? Array.from({ length: 7 }, (_, i) => addDays(startOfWeek(state.selectedDate), i))
          : [state.selectedDate];
        els.calendarShell.querySelectorAll(".now-line").forEach(n => n.remove());
        addNowLine(days);
      }
    }, 60000);

    // Start the app only after every const/function above is defined.
    init();
  </script>
</body>
</html>
